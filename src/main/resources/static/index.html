<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>base66</title>
  <style>
    :root {
      --bg: #eef3f7;
      --panel: #ffffff;
      --text: #17212b;
      --muted: #506070;
      --border: #d0d9e2;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --danger-bg: #fff1f2;
      --danger-border: #fecdd3;
      --danger-text: #9f1239;
      --user: #daf4ed;
      --bot: #e9eefb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 10%, #dffaf4 0%, var(--bg) 40%, #dce5ef 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(960px, 100%);
      min-height: min(760px, calc(100vh - 40px));
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 16px 42px rgba(15, 23, 42, 0.13);
      overflow: hidden;
      position: relative;
    }

    .view {
      height: 100%;
    }

    .hidden {
      display: none !important;
    }

    .view.hidden {
      display: none !important;
    }

    .login-view {
      display: grid;
      place-items: center;
      padding: 30px;
      background: linear-gradient(140deg, #f0f9ff 0%, #ffffff 35%, #ecfeff 100%);
    }

    .login-card {
      width: min(440px, 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 24px;
      display: grid;
      gap: 14px;
    }

    .login-title {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      margin: 0;
    }

    .login-subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }

    .field-label {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.12s ease, box-shadow 0.12s ease;
    }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .action-btn {
      border: none;
      border-radius: 10px;
      height: 44px;
      background: var(--accent);
      color: #ffffff;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .action-btn:hover {
      background: var(--accent-strong);
    }

    .action-btn:disabled {
      opacity: 0.56;
      cursor: not-allowed;
    }

    .error {
      margin: 0;
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger-text);
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.35;
      font-size: 0.92rem;
    }

    .chat-view {
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .chat-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #ffffff;
    }

    .title-wrap {
      display: grid;
      gap: 4px;
    }

    .chat-title {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
    }

    .session-meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .logout-btn {
      border: 1px solid var(--border);
      border-radius: 9px;
      height: 36px;
      padding: 0 12px;
      background: #ffffff;
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
    }

    .logout-btn:hover {
      background: #f8fafc;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ghost-btn {
      border: 1px solid var(--border);
      border-radius: 9px;
      height: 36px;
      padding: 0 12px;
      background: #f8fafc;
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
    }

    .ghost-btn:hover {
      background: #eef2f7;
    }

    .chat {
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      background: linear-gradient(180deg, #fcfeff 0%, #f7fafc 100%);
    }

    .message {
      max-width: 80%;
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
    }

    .message.bot {
      align-self: flex-start;
      background: var(--bot);
    }

    .message.error {
      align-self: center;
      background: var(--danger-bg);
      border-color: var(--danger-border);
      color: var(--danger-text);
    }

    .pending-pane {
      border-top: 1px solid var(--border);
      background: #fffbeb;
      padding: 12px 14px;
      display: grid;
      gap: 10px;
    }

    .session-pane {
      border-top: 1px solid var(--border);
      background: #f0f9ff;
      padding: 12px 14px;
      display: grid;
      gap: 10px;
    }

    .session-title {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 700;
      color: #075985;
    }

    .session-create {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .session-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .session-item {
      border: 1px solid #bae6fd;
      background: #ffffff;
      border-radius: 10px;
      padding: 8px 10px;
      display: grid;
      gap: 6px;
    }

    .session-item-header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .session-item-title {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 600;
      color: #0c4a6e;
    }

    .session-item-meta {
      margin: 0;
      font-size: 0.82rem;
      color: #334155;
    }

    .session-pill {
      border-radius: 999px;
      border: 1px solid #22c55e;
      background: #dcfce7;
      color: #166534;
      font-size: 0.74rem;
      font-weight: 700;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .session-select-btn {
      border: 1px solid #7dd3fc;
      border-radius: 8px;
      background: #e0f2fe;
      color: #0c4a6e;
      font-size: 0.8rem;
      font-weight: 600;
      height: 30px;
      padding: 0 10px;
      cursor: pointer;
      justify-self: start;
    }

    .session-item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .session-action-btn {
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      height: 30px;
      padding: 0 10px;
      cursor: pointer;
    }

    .session-action-btn.rename {
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #0f172a;
    }

    .session-action-btn.delete {
      border: 1px solid #fecdd3;
      background: #fff1f2;
      color: #9f1239;
    }

    .skill-pane {
      border-top: 1px solid var(--border);
      background: #eef6ff;
      padding: 12px 14px;
      display: grid;
      gap: 8px;
    }

    .skill-title {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 700;
      color: #1d4ed8;
    }

    .skill-hint {
      margin: 0;
      font-size: 0.85rem;
      color: #1e3a8a;
    }

    .skill-input {
      width: 100%;
      min-height: 120px;
      max-height: 260px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.4;
      outline: none;
    }

    .skill-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .skill-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .skill-actions .action-btn {
      height: 36px;
      padding: 0 12px;
    }

    .pending-title {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 700;
      color: #92400e;
    }

    .pending-card {
      border: 1px solid #fcd34d;
      border-radius: 10px;
      background: #fffbeb;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .pending-meta {
      margin: 0;
      font-size: 0.9rem;
      color: #78350f;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .pending-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pending-btn {
      border: 1px solid transparent;
      border-radius: 8px;
      height: 32px;
      padding: 0 10px;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
    }

    .pending-btn.allow {
      background: #dcfce7;
      border-color: #86efac;
      color: #14532d;
    }

    .pending-btn.always {
      background: #e0f2fe;
      border-color: #7dd3fc;
      color: #0c4a6e;
    }

    .pending-btn.reject {
      background: #fee2e2;
      border-color: #fca5a5;
      color: #7f1d1d;
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: #ffffff;
    }

    @media (max-width: 720px) {
      body {
        padding: 8px;
      }

      .shell {
        min-height: calc(100vh - 16px);
        border-radius: 14px;
      }

      .chat-header {
        padding: 12px;
      }

      .chat {
        padding: 12px;
      }

      .message {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section id="loginView" class="view login-view">
      <form id="loginForm" class="login-card">
        <h1 class="login-title">base66 login</h1>
        <p class="login-subtitle">Sign in with one of your configured users to access the chat.</p>

        <label class="field-label" for="usernameInput">Username</label>
        <input id="usernameInput" class="input" type="text" autocomplete="username" required>

        <label class="field-label" for="passwordInput">Password</label>
        <input id="passwordInput" class="input" type="password" autocomplete="current-password" required>

        <p id="loginError" class="error hidden" role="alert"></p>

        <button id="loginBtn" class="action-btn" type="submit">Sign in</button>
      </form>
    </section>

    <section id="chatView" class="view chat-view hidden">
      <header class="chat-header">
        <div class="title-wrap">
          <h2 class="chat-title">base66</h2>
          <p id="sessionMeta" class="session-meta">Signed in</p>
        </div>
        <div class="header-actions">
          <button id="sessionBtn" class="ghost-btn" type="button">Sessions</button>
          <button id="skillBtn" class="ghost-btn" type="button">Create Skill</button>
          <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
        </div>
      </header>

      <section id="chat" class="chat" aria-live="polite"></section>

      <section id="pendingPermissions" class="pending-pane hidden" aria-live="polite"></section>

      <section id="sessionPane" class="session-pane hidden" aria-live="polite">
        <p class="session-title">Sessions (Only your workspace)</p>
        <div class="session-create">
          <input id="sessionTitleInput" class="input" type="text" placeholder="Optional new session title" autocomplete="off">
          <button id="createSessionBtn" class="action-btn" type="button">New</button>
        </div>
        <div id="sessionList" class="session-list"></div>
      </section>

      <section id="skillPane" class="skill-pane hidden" aria-live="polite">
        <p class="skill-title">Create Skill From Free Text</p>
        <p class="skill-hint">Provide skill name and content. OpenCode will create SKILL.md and generate only the description.</p>
        <label class="field-label" for="skillNameInput">Skill name</label>
        <input
          id="skillNameInput"
          class="input"
          type="text"
          placeholder="example: java-controller-guardrails"
          autocomplete="off"
        >
        <label class="field-label" for="skillTextInput">Skill content</label>
        <textarea
          id="skillTextInput"
          class="skill-input"
          placeholder="Example: Create a skill that reviews Java controllers for auth and validation issues..."
        ></textarea>
        <div class="skill-actions">
          <button id="submitSkillBtn" class="action-btn" type="button">Create</button>
          <button id="cancelSkillBtn" class="ghost-btn" type="button">Cancel</button>
        </div>
      </section>

      <form id="chatForm" class="composer">
        <input
          id="messageInput"
          class="input"
          type="text"
          name="message"
          placeholder="Type your message..."
          autocomplete="off"
          required
        >
        <button id="sendBtn" class="action-btn" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script>
    const TOKEN_KEY = 'base66.jwt';
    const USERNAME_KEY = 'base66.username';
    const AGENT_KEY = 'base66.agent';
    const API_BASE_KEY = 'base66.apiBaseUrl';

    function normalizeApiBaseUrl(value) {
      const raw = (value || '').trim();
      if (!raw) {
        return '';
      }
      return raw.replace(/\/+$/, '');
    }

    const queryApiBaseUrl = new URLSearchParams(window.location.search).get('apiBaseUrl');
    if (queryApiBaseUrl) {
      localStorage.setItem(API_BASE_KEY, queryApiBaseUrl);
    }

    const configuredApiBaseUrl =
      window.BASE66_API_BASE_URL
      || localStorage.getItem(API_BASE_KEY)
      || '';

    const API_BASE_URL = normalizeApiBaseUrl(configuredApiBaseUrl);

    function apiUrl(path) {
      if (!path) {
        return API_BASE_URL;
      }
      const normalizedPath = path.startsWith('/') ? path : `/${path}`;
      return API_BASE_URL ? `${API_BASE_URL}${normalizedPath}` : normalizedPath;
    }

    const loginViewEl = document.getElementById('loginView');
    const chatViewEl = document.getElementById('chatView');

    const loginFormEl = document.getElementById('loginForm');
    const usernameInputEl = document.getElementById('usernameInput');
    const passwordInputEl = document.getElementById('passwordInput');
    const loginBtnEl = document.getElementById('loginBtn');
    const loginErrorEl = document.getElementById('loginError');

    const sessionMetaEl = document.getElementById('sessionMeta');
    const sessionBtnEl = document.getElementById('sessionBtn');
    const skillBtnEl = document.getElementById('skillBtn');
    const logoutBtnEl = document.getElementById('logoutBtn');

    const chatEl = document.getElementById('chat');
    const pendingPermissionsEl = document.getElementById('pendingPermissions');
    const sessionPaneEl = document.getElementById('sessionPane');
    const sessionTitleInputEl = document.getElementById('sessionTitleInput');
    const createSessionBtnEl = document.getElementById('createSessionBtn');
    const sessionListEl = document.getElementById('sessionList');
    const skillPaneEl = document.getElementById('skillPane');
    const skillNameInputEl = document.getElementById('skillNameInput');
    const skillTextInputEl = document.getElementById('skillTextInput');
    const submitSkillBtnEl = document.getElementById('submitSkillBtn');
    const cancelSkillBtnEl = document.getElementById('cancelSkillBtn');
    const chatFormEl = document.getElementById('chatForm');
    const inputEl = document.getElementById('messageInput');
    const sendBtnEl = document.getElementById('sendBtn');
    let permissionPollTimer = null;

    function setLoginError(message) {
      if (!message) {
        loginErrorEl.classList.add('hidden');
        loginErrorEl.textContent = '';
        return;
      }

      loginErrorEl.textContent = message;
      loginErrorEl.classList.remove('hidden');
    }

    function addMessage(text, role) {
      const messageEl = document.createElement('div');
      messageEl.className = `message ${role}`;
      messageEl.textContent = text;
      chatEl.appendChild(messageEl);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function readToken() {
      return sessionStorage.getItem(TOKEN_KEY);
    }

    function showLogin(message) {
      chatViewEl.classList.add('hidden');
      loginViewEl.classList.remove('hidden');
      setLoginError(message || '');
      passwordInputEl.value = '';
      usernameInputEl.focus();
    }

    function showChat(username, agentName) {
      setLoginError('');
      loginViewEl.classList.add('hidden');
      chatViewEl.classList.remove('hidden');
      sessionMetaEl.textContent = `Signed in as ${username} • Agent: ${agentName}`;
      inputEl.focus();

      if (!chatEl.childElementCount) {
        addMessage(`Welcome ${username}. You are now authenticated.`, 'bot');
      }
    }

    function logout(message) {
      sessionStorage.removeItem(TOKEN_KEY);
      sessionStorage.removeItem(USERNAME_KEY);
      sessionStorage.removeItem(AGENT_KEY);
      chatEl.innerHTML = '';
      pendingPermissionsEl.innerHTML = '';
      pendingPermissionsEl.classList.add('hidden');
      sessionPaneEl.classList.add('hidden');
      sessionTitleInputEl.value = '';
      sessionListEl.innerHTML = '';
      skillPaneEl.classList.add('hidden');
      skillNameInputEl.value = '';
      skillTextInputEl.value = '';
      if (permissionPollTimer) {
        clearInterval(permissionPollTimer);
        permissionPollTimer = null;
      }
      showLogin(message || '');
    }

    function openSkillPane() {
      sessionPaneEl.classList.add('hidden');
      skillPaneEl.classList.remove('hidden');
      skillNameInputEl.focus();
    }

    function closeSkillPane() {
      skillPaneEl.classList.add('hidden');
      skillNameInputEl.value = '';
      skillTextInputEl.value = '';
    }

    function formatTime(epochMillis) {
      if (!epochMillis) {
        return 'unknown';
      }
      const date = new Date(epochMillis);
      if (Number.isNaN(date.getTime())) {
        return 'unknown';
      }
      return date.toLocaleString();
    }

    function renderSessionList(sessions) {
      sessionListEl.innerHTML = '';
      if (!Array.isArray(sessions) || sessions.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'session-item-meta';
        empty.textContent = 'No sessions found in your workspace.';
        sessionListEl.appendChild(empty);
        return;
      }

      const frag = document.createDocumentFragment();
      sessions.forEach((session) => {
        const card = document.createElement('article');
        card.className = 'session-item';

        const header = document.createElement('div');
        header.className = 'session-item-header';

        const title = document.createElement('p');
        title.className = 'session-item-title';
        title.textContent = session.title || session.id;
        header.appendChild(title);

        if (session.active) {
          const activePill = document.createElement('span');
          activePill.className = 'session-pill';
          activePill.textContent = 'Active';
          header.appendChild(activePill);
        }

        const meta = document.createElement('p');
        meta.className = 'session-item-meta';
        meta.textContent = `Updated: ${formatTime(session.updatedAt)} • ID: ${session.id}`;

        card.appendChild(header);
        card.appendChild(meta);

        const actions = document.createElement('div');
        actions.className = 'session-item-actions';

        if (!session.active) {
          const selectBtn = document.createElement('button');
          selectBtn.className = 'session-select-btn session-action-btn';
          selectBtn.type = 'button';
          selectBtn.textContent = 'Use this session';
          selectBtn.setAttribute('data-session-id', session.id || '');
          selectBtn.setAttribute('data-action', 'select');
          actions.appendChild(selectBtn);
        }

        const renameBtn = document.createElement('button');
        renameBtn.className = 'session-action-btn rename';
        renameBtn.type = 'button';
        renameBtn.textContent = 'Rename';
        renameBtn.setAttribute('data-session-id', session.id || '');
        renameBtn.setAttribute('data-session-title', session.title || '');
        renameBtn.setAttribute('data-action', 'rename');
        actions.appendChild(renameBtn);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'session-action-btn delete';
        deleteBtn.type = 'button';
        deleteBtn.textContent = 'Delete';
        deleteBtn.setAttribute('data-session-id', session.id || '');
        deleteBtn.setAttribute('data-action', 'delete');
        actions.appendChild(deleteBtn);

        card.appendChild(actions);

        frag.appendChild(card);
      });

      sessionListEl.appendChild(frag);
    }

    async function fetchSessions() {
      const token = readToken();
      if (!token) {
        logout('Your session was not found. Please sign in again.');
        return [];
      }

      const response = await fetch(apiUrl('/api/base66/sessions?limit=30'), {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });

      if (response.status === 401) {
        logout('Session expired or invalid token. Please sign in again.');
        return [];
      }

      if (!response.ok) {
        throw new Error('Failed to load sessions');
      }

      return response.json();
    }

    async function createSession(title) {
      const token = readToken();
      if (!token) {
        logout('Your session was not found. Please sign in again.');
        throw new Error('Not authenticated');
      }

      const response = await fetch(apiUrl('/api/base66/sessions'), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ title })
      });

      if (response.status === 401) {
        logout('Session expired or invalid token. Please sign in again.');
        throw new Error('Authentication required');
      }

      if (!response.ok) {
        throw new Error('Failed to create session');
      }

      return response.json();
    }

    async function selectSession(sessionId) {
      const token = readToken();
      if (!token) {
        logout('Your session was not found. Please sign in again.');
        throw new Error('Not authenticated');
      }

      const response = await fetch(apiUrl(`/api/base66/sessions/${encodeURIComponent(sessionId)}/select`), {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });

      if (response.status === 401) {
        logout('Session expired or invalid token. Please sign in again.');
        throw new Error('Authentication required');
      }

      if (!response.ok) {
        throw new Error('Failed to select session');
      }

      const payload = await response.json();
      return Boolean(payload.success);
    }

    async function renameSession(sessionId, title) {
      const token = readToken();
      if (!token) {
        logout('Your session was not found. Please sign in again.');
        throw new Error('Not authenticated');
      }

      const response = await fetch(apiUrl(`/api/base66/sessions/${encodeURIComponent(sessionId)}`), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ title })
      });

      if (response.status === 401) {
        logout('Session expired or invalid token. Please sign in again.');
        throw new Error('Authentication required');
      }

      if (!response.ok) {
        throw new Error('Failed to rename session');
      }

      return response.json();
    }

    async function deleteSession(sessionId) {
      const token = readToken();
      if (!token) {
        logout('Your session was not found. Please sign in again.');
        throw new Error('Not authenticated');
      }

      const response = await fetch(apiUrl(`/api/base66/sessions/${encodeURIComponent(sessionId)}`), {
        method: 'DELETE',
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });

      if (response.status === 401) {
        logout('Session expired or invalid token. Please sign in again.');
        throw new Error('Authentication required');
      }

      if (!response.ok) {
        throw new Error('Failed to delete session');
      }

      const payload = await response.json();
      return Boolean(payload.success);
    }

    async function refreshSessions() {
      const sessions = await fetchSessions();
      renderSessionList(sessions);
      return sessions;
    }

    async function openSessionPane() {
      closeSkillPane();
      sessionPaneEl.classList.remove('hidden');
      await refreshSessions();
      sessionTitleInputEl.focus();
    }

    function closeSessionPane() {
      sessionPaneEl.classList.add('hidden');
      sessionTitleInputEl.value = '';
    }

    function renderPendingPermissions(permissions) {
      if (!permissions || !permissions.length) {
        pendingPermissionsEl.innerHTML = '';
        pendingPermissionsEl.classList.add('hidden');
        return;
      }

      const title = document.createElement('p');
      title.className = 'pending-title';
      title.textContent = 'OpenCode is waiting for your permission';

      const frag = document.createDocumentFragment();
      frag.appendChild(title);

      permissions.forEach((item) => {
        const card = document.createElement('article');
        card.className = 'pending-card';

        const patterns = Array.isArray(item.patterns) && item.patterns.length
          ? item.patterns.map((p) => `- ${p}`).join('\n')
          : '(no patterns provided)';

        const meta = document.createElement('p');
        meta.className = 'pending-meta';
        meta.textContent = `Type: ${item.permission || 'unknown'}\n${patterns}`;
        card.appendChild(meta);

        const actions = document.createElement('div');
        actions.className = 'pending-actions';

        const onceBtn = document.createElement('button');
        onceBtn.className = 'pending-btn allow';
        onceBtn.type = 'button';
        onceBtn.textContent = 'Allow once';
        onceBtn.setAttribute('data-request-id', item.id || '');
        onceBtn.setAttribute('data-reply', 'once');

        const alwaysBtn = document.createElement('button');
        alwaysBtn.className = 'pending-btn always';
        alwaysBtn.type = 'button';
        alwaysBtn.textContent = 'Allow always';
        alwaysBtn.setAttribute('data-request-id', item.id || '');
        alwaysBtn.setAttribute('data-reply', 'always');

        const rejectBtn = document.createElement('button');
        rejectBtn.className = 'pending-btn reject';
        rejectBtn.type = 'button';
        rejectBtn.textContent = 'Reject';
        rejectBtn.setAttribute('data-request-id', item.id || '');
        rejectBtn.setAttribute('data-reply', 'reject');

        actions.appendChild(onceBtn);
        actions.appendChild(alwaysBtn);
        actions.appendChild(rejectBtn);
        card.appendChild(actions);

        frag.appendChild(card);
      });

      pendingPermissionsEl.innerHTML = '';
      pendingPermissionsEl.appendChild(frag);
      pendingPermissionsEl.classList.remove('hidden');
    }

    async function fetchPendingPermissions() {
      const token = readToken();
      if (!token) {
        return [];
      }

      const response = await fetch(apiUrl('/api/base66/permissions/pending'), {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });

      if (response.status === 401) {
        logout('Session expired or invalid token. Please sign in again.');
        return [];
      }

      if (!response.ok) {
        return [];
      }

      return response.json();
    }

    async function refreshPendingPermissions() {
      try {
        const permissions = await fetchPendingPermissions();
        renderPendingPermissions(permissions);
        return permissions.length;
      } catch (_error) {
        return 0;
      }
    }

    function startPermissionPolling() {
      if (permissionPollTimer) {
        return;
      }

      void refreshPendingPermissions();
      permissionPollTimer = setInterval(() => {
        void refreshPendingPermissions();
      }, 2000);
    }

    function stopPermissionPolling() {
      if (!permissionPollTimer) {
        return;
      }
      clearInterval(permissionPollTimer);
      permissionPollTimer = null;
    }

    async function replyPermission(requestId, reply) {
      const token = readToken();
      if (!token) {
        logout('Your session was not found. Please sign in again.');
        return false;
      }

      const response = await fetch(apiUrl(`/api/base66/permissions/${encodeURIComponent(requestId)}/reply`), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ reply })
      });

      if (response.status === 401) {
        logout('Session expired or invalid token. Please sign in again.');
        return false;
      }

      if (!response.ok) {
        return false;
      }

      const payload = await response.json();
      return Boolean(payload.success);
    }

    async function login(username, password) {
      const response = await fetch(apiUrl('/api/auth/login'), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password })
      });

      if (!response.ok) {
        let details = '';
        try {
          const err = await response.json();
          details = err.detail || err.message || '';
        } catch (_e) {
          details = await response.text();
        }
        throw new Error(details || 'Invalid username or password');
      }

      return response.json();
    }

    async function sendMessage(message) {
      const token = readToken();
      if (!token) {
        logout('Your session was not found. Please sign in again.');
        throw new Error('Not authenticated');
      }

      const response = await fetch(apiUrl('/api/base66/chat'), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ message })
      });

      if (response.status === 401) {
        logout('Session expired or invalid token. Please sign in again.');
        throw new Error('Authentication required');
      }

      if (!response.ok) {
        let details = '';
        try {
          const err = await response.json();
          details = err.detail || err.message || JSON.stringify(err);
        } catch (_e) {
          details = await response.text();
        }
        throw new Error(details || `Request failed with status ${response.status}`);
      }

      const data = await response.json();
      return data.response || '';
    }

    async function createSkillFromText(skillName, content) {
      const token = readToken();
      if (!token) {
        logout('Your session was not found. Please sign in again.');
        throw new Error('Not authenticated');
      }

      const response = await fetch(apiUrl('/api/base66/skills/from-text'), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ skillName, content })
      });

      if (response.status === 401) {
        logout('Session expired or invalid token. Please sign in again.');
        throw new Error('Authentication required');
      }

      if (!response.ok) {
        let details = '';
        try {
          const err = await response.json();
          details = err.detail || err.message || JSON.stringify(err);
        } catch (_e) {
          details = await response.text();
        }
        throw new Error(details || `Skill creation failed with status ${response.status}`);
      }

      return response.json();
    }

    loginFormEl.addEventListener('submit', async (event) => {
      event.preventDefault();
      const username = usernameInputEl.value.trim();
      const password = passwordInputEl.value;

      if (!username || !password) {
        setLoginError('Username and password are required.');
        return;
      }

      loginBtnEl.disabled = true;
      setLoginError('');

      try {
        const payload = await login(username, password);
        if (!payload.token) {
          throw new Error('Missing token in login response');
        }

        const loggedInUser = payload.username || username;
        const agentName = payload.agentName || `${loggedInUser}-agent`;
        sessionStorage.setItem(TOKEN_KEY, payload.token);
        sessionStorage.setItem(USERNAME_KEY, loggedInUser);
        sessionStorage.setItem(AGENT_KEY, agentName);
        showChat(loggedInUser, agentName);
      } catch (error) {
        setLoginError(error.message || 'Unable to sign in');
      } finally {
        loginBtnEl.disabled = false;
      }
    });

    chatFormEl.addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = inputEl.value.trim();
      if (!message) {
        return;
      }

      addMessage(message, 'user');
      inputEl.value = '';
      inputEl.focus();

      sendBtnEl.disabled = true;
      startPermissionPolling();
      try {
        const reply = await sendMessage(message);
        addMessage(reply || '(no response)', 'bot');
      } catch (error) {
        if (error.message !== 'Authentication required') {
          addMessage(`Error: ${error.message}`, 'error');
        }
      } finally {
        const pendingCount = await refreshPendingPermissions();
        if (pendingCount === 0) {
          stopPermissionPolling();
        }
        sendBtnEl.disabled = false;
      }
    });

    pendingPermissionsEl.addEventListener('click', async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) {
        return;
      }

      const requestId = target.getAttribute('data-request-id');
      const reply = target.getAttribute('data-reply');
      if (!requestId || !reply) {
        return;
      }

      target.disabled = true;
      const success = await replyPermission(requestId, reply);
      if (!success) {
        addMessage('Error: failed to send permission reply.', 'error');
      }
      await refreshPendingPermissions();
      target.disabled = false;
    });

    skillBtnEl.addEventListener('click', () => {
      if (skillPaneEl.classList.contains('hidden')) {
        openSkillPane();
        return;
      }
      closeSkillPane();
    });

    cancelSkillBtnEl.addEventListener('click', () => {
      closeSkillPane();
    });

    submitSkillBtnEl.addEventListener('click', async () => {
      const skillName = skillNameInputEl.value.trim();
      const freeText = skillTextInputEl.value.trim();
      if (!skillName) {
        addMessage('Error: skill name is required.', 'error');
        return;
      }
      if (!freeText) {
        addMessage('Error: skill content is required.', 'error');
        return;
      }

      submitSkillBtnEl.disabled = true;
      cancelSkillBtnEl.disabled = true;
      addMessage('Creating skill from text...', 'bot');
      startPermissionPolling();

      try {
        const payload = await createSkillFromText(skillName, freeText);
        if (!payload.success) {
          addMessage(`Skill creation failed: ${payload.message || 'Operation failed.'}`, 'error');
          return;
        }

        addMessage(`Skill created at ${payload.path}`, 'bot');
        closeSkillPane();
      } catch (error) {
        if (error.message !== 'Authentication required') {
          addMessage(`Skill creation failed: ${error.message}`, 'error');
        }
      } finally {
        const pendingCount = await refreshPendingPermissions();
        if (pendingCount === 0) {
          stopPermissionPolling();
        }
        submitSkillBtnEl.disabled = false;
        cancelSkillBtnEl.disabled = false;
      }
    });

    logoutBtnEl.addEventListener('click', () => {
      logout('You have been logged out.');
    });

    sessionBtnEl.addEventListener('click', async () => {
      if (sessionPaneEl.classList.contains('hidden')) {
        try {
          await openSessionPane();
        } catch (_error) {
          addMessage('Error: failed to load sessions.', 'error');
        }
        return;
      }
      closeSessionPane();
    });

    createSessionBtnEl.addEventListener('click', async () => {
      const title = sessionTitleInputEl.value.trim();
      createSessionBtnEl.disabled = true;
      try {
        const created = await createSession(title);
        addMessage(`Switched to new session: ${created.title || created.id}`, 'bot');
        sessionTitleInputEl.value = '';
        await refreshSessions();
      } catch (error) {
        if (error.message !== 'Authentication required') {
          addMessage(`Error: ${error.message}`, 'error');
        }
      } finally {
        createSessionBtnEl.disabled = false;
      }
    });

    sessionListEl.addEventListener('click', async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) {
        return;
      }

      const sessionId = target.getAttribute('data-session-id');
      const action = target.getAttribute('data-action');
      if (!sessionId || !action) {
        return;
      }

      target.disabled = true;
      try {
        if (action === 'select') {
          const success = await selectSession(sessionId);
          if (!success) {
            addMessage('Error: session does not belong to your workspace.', 'error');
            return;
          }
          addMessage(`Switched active session to ${sessionId}`, 'bot');
          await refreshSessions();
          return;
        }

        if (action === 'rename') {
          const currentTitle = target.getAttribute('data-session-title') || '';
          const nextTitle = window.prompt('Rename session', currentTitle);
          if (nextTitle === null) {
            return;
          }
          const trimmedTitle = nextTitle.trim();
          if (!trimmedTitle) {
            addMessage('Error: session title cannot be empty.', 'error');
            return;
          }

          const updated = await renameSession(sessionId, trimmedTitle);
          addMessage(`Session renamed to ${updated.title || trimmedTitle}`, 'bot');
          await refreshSessions();
          return;
        }

        if (action === 'delete') {
          const confirmed = window.confirm('Delete this session permanently?');
          if (!confirmed) {
            return;
          }

          const success = await deleteSession(sessionId);
          if (!success) {
            addMessage('Error: failed to delete session.', 'error');
            return;
          }

          addMessage(`Deleted session ${sessionId}`, 'bot');
          await refreshSessions();
        }
      } catch (error) {
        if (error.message !== 'Authentication required') {
          addMessage(`Error: ${error.message}`, 'error');
        }
      } finally {
        target.disabled = false;
      }
    });

    const existingToken = sessionStorage.getItem(TOKEN_KEY);
    const existingUser = sessionStorage.getItem(USERNAME_KEY);
    const existingAgent = sessionStorage.getItem(AGENT_KEY);
    if (existingToken && existingUser) {
      showChat(existingUser, existingAgent || `${existingUser}-agent`);
    } else {
      showLogin('');
    }
  </script>
</body>
</html>
